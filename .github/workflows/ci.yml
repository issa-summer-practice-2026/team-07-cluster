name: CI Pipeline
on: [push, pull_request]
jobs:
    backend:
        runs-on: ubuntu-latest
        defaults:
            run:
             working-directory: backend
        steps:
            - uses: actions/checkout@v4
            - name: Build Docker Image
              working-directory: .
              run: docker build -t cluster .
            
            - name: Ruff check
              run: docker run cluster ruff check .

            - name: pytest
              run: |
               docker run --name test-container cluster pytest --cov --cov-fail-under=80
               docker cp test-container:/app/backend/.coverage .coverage 
              
            - name: Upload coverage 
              uses: actions/upload-artifact@v4
              with:
                  name: backend-coverage-report
                  path: backend/.coverage
            - name: python check
              run: docker run cluster python -m compileall .

            - name: boot the app
              run: |
               docker run -d -p 8000:8000 cluster
               sleep 5
               curl --fail http://127.0.0.1:8000/health
              
    frontend: 
        runs-on: ubuntu-latest
        defaults:
            run:
             working-directory: frontend
        steps:
            - uses: actions/checkout@v4
            - name: Set up Node.js
              uses: actions/setup-node@v3
              with:
                  node-version: '24.18.0'

            - name: Install dependencies
              run: npm ci

            - name: Run Lint
              run: npm run lint

            - name: typecheck
              run: npm run typecheck
              
            - name: Run tests
              run: npm test

            - name: Build
              run: npm run build